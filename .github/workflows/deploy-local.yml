name: Deploy ML service to local minikube

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: local-expenses-ml-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, macOS, ARM64, expenses-local]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build and restart only ML service
        run: /Users/unknown1/IdeaProjects/infra/scripts/deploy-service.sh ml "$GITHUB_WORKSPACE"
